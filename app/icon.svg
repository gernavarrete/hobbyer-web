<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&amp;display=swap');
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a6fff"/>
      <stop offset="50%" stop-color="#0d59f2"/>
      <stop offset="100%" stop-color="#0a3db5"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="1024" height="1024" rx="230" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#shine)"/>

  <!-- H bold redondeada — Plus Jakarta Sans ExtraBold style -->
  <rect x="168" y="134" width="240" height="756" rx="120" fill="white"/>
  <rect x="616" y="134" width="240" height="756" rx="120" fill="white"/>
  <rect x="168" y="408" width="688" height="208" rx="104" fill="white"/>
</svg>
