<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a6fff"/>
      <stop offset="50%" stop-color="#0d59f2"/>
      <stop offset="100%" stop-color="#0a3db5"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a6fff"/>
      <stop offset="60%" stop-color="#0d59f2"/>
      <stop offset="100%" stop-color="#0a3db5"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="120" height="120" rx="27" fill="url(#iconGrad)"/>
  <rect x="0" y="0" width="120" height="120" rx="27" fill="url(#shine)"/>

  <!-- H dentro del icon -->
  <rect x="20" y="16" width="28" height="88" rx="14" fill="white"/>
  <rect x="72" y="16" width="28" height="88" rx="14" fill="white"/>
  <rect x="20" y="48" width="80" height="24" rx="12" fill="white"/>

  <!-- Wordmark "Hobbyer" -->
  <text
    x="148"
    y="85"
    font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-2"
    fill="url(#textGrad)"
  >Hobbyer</text>
</svg>
